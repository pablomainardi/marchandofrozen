<script src="https://unpkg.com/@ericblade/quagga2@1.2.6/dist/quagga.min.js"></script>

<div class="modal fade" id="modalEscaner" tabindex="-1" aria-labelledby="modalEscanerLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalEscanerLabel">Escanear Código de Barras</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="scanner-container" style="width: 100%; height: 180px; background: #000;"></div>

        <form id="formEscaner" method="POST" class="mt-3" style="display:none;">
          <input type="hidden" name="id" id="id_producto" />

          <div class="mb-3">
            <label class="form-label">Código de Barra</label>
            <input type="text" class="form-control" name="codigo_barra" id="codigo_barra" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Producto</label>
            <input type="text" class="form-control" name="producto" id="producto" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" step="0.01" class="form-control" name="cantidad" id="cantidad" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Unidad</label>
            <select class="form-select" name="unidad" id="unidad" required>
              <option value="g">g</option>
              <option value="ml">ml</option>
              <option value="unidad">unidad</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Costo Total</label>
            <input type="number" step="0.01" class="form-control" name="costo_total" id="costo_total" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal" id="cancelarEscanerBtn" style="display:none;">Cancelar</button>
        <button class="btn btn-success" onclick="guardarProducto()" id="confirmarEscanerBtn" style="display:none;">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script>
let escanerActivo = false;

document.getElementById('modalEscaner').addEventListener('shown.bs.modal', iniciarEscaner);
document.getElementById('modalEscaner').addEventListener('hidden.bs.modal', () => {
  detenerEscaner();
  resetFormulario();
});

function iniciarEscaner() {
  if (escanerActivo) return;
  escanerActivo = true;

  Quagga.init({
    inputStream: {
      type: "LiveStream",
      target: document.querySelector('#scanner-container'),
      constraints: { facingMode: "environment" }
    },
    decoder: { readers: ["ean_reader", "code_128_reader", "upc_reader", "code_39_reader"] }
  }, function(err) {
    if (err) { console.error(err); alert("Error iniciando escáner: " + err); return; }
    Quagga.start();
  });

  Quagga.onDetected(onCodigoDetectado);
}

function detenerEscaner() {
  if (!escanerActivo) return;
  Quagga.stop();
  Quagga.offDetected(onCodigoDetectado);
  escanerActivo = false;
}

function onCodigoDetectado(result) {
  if (!result?.codeResult?.code) return;
  const codigo = result.codeResult.code;
  detenerEscaner();

  document.getElementById('scanner-container').style.display = 'none';
  document.getElementById('formEscaner').style.display = 'block';
  document.getElementById('cancelarEscanerBtn').style.display = 'inline-block';
  document.getElementById('confirmarEscanerBtn').style.display = 'inline-block';

  document.getElementById('codigo_barra').value = codigo;

  fetch(`/buscar_producto_por_codigo?codigo=${encodeURIComponent(codigo)}`)
    .then(res => res.json())
    .then(data => {
      if (data.existe) {
        const p = data.producto;
        document.getElementById('id_producto').value = p.id;
        document.getElementById('producto').value = p.producto || '';
        document.getElementById('cantidad').value = p.cantidad || '';
        document.getElementById('unidad').value = p.unidad || 'unidad';
        document.getElementById('costo_total').value = p.costo_total || '';
      } else {
        resetFormularioInputs(codigo);
      }
    })
    .catch(err => alert("Error consultando producto: " + err));
}

function resetFormularioInputs(codigo = '') {
  document.getElementById('id_producto').value = '';
  document.getElementById('codigo_barra').value = codigo;
  document.getElementById('producto').value = '';
  document.getElementById('cantidad').value = '';
  document.getElementById('unidad').value = 'unidad';
  document.getElementById('costo_total').value = '';
}

function resetFormulario() {
  document.getElementById('scanner-container').style.display = 'block';
  document.getElementById('formEscaner').style.display = 'none';
  document.getElementById('cancelarEscanerBtn').style.display = 'none';
  document.getElementById('confirmarEscanerBtn').style.display = 'none';
  resetFormularioInputs();
}

function guardarProducto() {
  const form = document.getElementById('formEscaner');
  form.action = '/guardar_producto';
  form.method = 'POST';
  form.submit();
}
</script>
