<!-- Modal HTML -->
<div class="modal fade" id="modalEscaner" tabindex="-1" aria-labelledby="modalEscanerLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalEscanerLabel">Escanear Código de Barras</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body position-relative">

        <!-- Contenedor del video/canvas -->
        <div id="video-container" style="width:100%; height:400px; position:relative;">
          <div id="scan-area-rectangle"></div>
        </div>

        <div id="scan-message" class="mt-2 text-center text-muted"></div>

        <form id="formEscaner" method="POST" class="mt-3" style="display:none;">
          <input type="hidden" name="id" id="id_producto" />
          <div class="mb-3">
            <label class="form-label">Código de Barra</label>
            <input type="text" class="form-control" name="codigo_barra" id="codigo_barra" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Producto</label>
            <input type="text" class="form-control" name="producto" id="producto" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" step="0.01" class="form-control" name="cantidad" id="cantidad" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Unidad</label>
            <select class="form-select" name="unidad" id="unidad" required>
              <option value="g">g</option>
              <option value="ml">ml</option>
              <option value="unidad">unidad</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Costo Total</label>
            <input type="number" step="0.01" class="form-control" name="costo_total" id="costo_total" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal" id="cancelarEscanerBtn" style="display:none;">Cancelar</button>
        <button class="btn btn-success" onclick="guardarProducto()" id="confirmarEscanerBtn" style="display:none;">Guardar</button>
      </div>
    </div>
  </div>
</div>

<style>
  #video-container {
    width: 100%;
    max-width: 100%;
    height: auto;
    max-height: 400px;
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    background: #000;
  }

  #video-container canvas,
  #video-container video {
    width: 100% !important;
    height: auto !important;
    object-fit: contain;
  }

  /* Rectángulo guía */
  #scan-area-rectangle {
    position: absolute;
    border: 3px solid rgba(0, 123, 255, 0.8);
    border-radius: 8px;
    width: 60%;
    height: 40%;
    top: 30%;
    left: 20%;
    pointer-events: none;
    box-sizing: border-box;
  }

  @media (max-width: 768px) {
    #video-container {
      max-height: 300px;
    }
    #scan-area-rectangle {
      width: 80%;
      height: 30%;
      top: 35%;
      left: 10%;
    }
  }
</style>
